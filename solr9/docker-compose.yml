services:
  solr:
    image: ${BIREME_SOLR_IMAGE_NAME}
    container_name: ${CONTAINER_NAME}
    user: "${USER_GROUP_IDS}"
    ulimits:
      nofile:
        soft: 65000
        hard: 65000
    ports:
      - "${CONTAINER_PORT}:8983"
    env_file:
      - .env
    environment:
      # The mounted index dir is itself the Solr home (solr.xml + cores at its
      # root), so override the image default of /var/solr/data.
      - SOLR_HOME=/var/solr
    volumes:
      - ${IAHX_INDEX_PATH}:/var/solr
